PROJECT_NAME = yodo1mas

# === AIR SDK Path ===
# Update this to point to your AIR SDK installation
# macOS example:
AIR_SDK_PATH = /path/to/your/AIRSDK
# Windows example:
# AIR_SDK_PATH = C:/Program Files/AIRSDK

FRE_JAR = ${AIR_SDK_PATH}/lib/android/FlashRuntimeExtensions.jar
ADT_JAR = ${AIR_SDK_PATH}/lib/adt.jar

# === Build Directories ===
BINARIES_FOLDER = dest
ACTIONSCRIPT_FOLDER = as
DEMO_FOLDER = demo/anes

# === Output Paths ===
ANE_PATH = ${BINARIES_FOLDER}/yodo1mas.ane

# === Source Paths ===
SWC_PATH = ${ACTIONSCRIPT_FOLDER}/bin/${PROJECT_NAME}.swc
EXTENSION_XML = config/extension.xml
IOS_PLATFORM_OPTIONS = config/platform-ios.xml
AND_PLATFORM_OPTIONS = config/platform-android.xml

# === Android Build ===
ANDROID_PROJECT = Yodo1MasAndroidProject
ANDROID_LIB_MODULE = yodo1mas_lib
